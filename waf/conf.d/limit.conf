# nginx rate limiting for WAF proxy
# This file is mounted into the WAF container and applies request rate limits per IP.

limit_req_zone $binary_remote_addr zone=one:10m rate=30r/m;

# Apply the limit in the server context; the default server config will include files in conf.d
server {
    listen 8080 default_server;

    # Apply limit for all locations proxied to backend
    location / {
        limit_req zone=one burst=10 nodelay;
        proxy_pass http://web:80;
        include /etc/nginx/includes/proxy_backend.conf;
    }
}
