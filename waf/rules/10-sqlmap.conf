# Custom ModSecurity rules to detect sqlmap and common blind SQLi patterns
# WARNING: example rules for demo purposes. Test in a safe environment.

# Initialize an IP collection for counters (may be provided by CRS/init)
SecAction "id:900000,phase:1,pass,nolog,initcol:ip=%{REMOTE_ADDR},expirevar:ip.sqlmap_counter=60"

# Detect SQLMap by User-Agent and increment counter
SecRule REQUEST_HEADERS:User-Agent "@pm sqlmap" \
    "id:900001,phase:1,pass,log,tag:'SQLMAP',msg:'sqlmap User-Agent detected',setvar:ip.sqlmap_counter=+1,expirevar:ip.sqlmap_counter=300"

# Detect common time-based or UNION patterns in args or request body
SecRule ARGS|REQUEST_BODY "@rx (union\s+select|sleep\s*\(|benchmark\s*\()" \
    "id:900002,phase:2,pass,log,tag:'SQLI-Pattern',msg:'Possible SQLi pattern detected',setvar:ip.sqlmap_counter=+1,expirevar:ip.sqlmap_counter=300"

# If counter > 2 (3 or more hits) then block the IP for a period
SecRule IP:SQLMAP_COUNTER "@gt 2" \
    "id:900010,phase:1,deny,log,status:403,msg:'IP blocked due to repeated SQLi-like requests',tag:'sqlmap-block'"

# Immediate deny if an exact match of known sqlmap injection strings or sqli scans
SecRule ARGS|REQUEST_BODY "@pmx sqlmap" "id:900020,phase:2,deny,log,msg:'sqlmap signature in payload'"
