# Custom ModSecurity rules to detect sqlmap and common blind SQLi patterns
# WARNING: example rules for demo purposes. Test in a safe environment.

# Initialize an IP collection for counters (may be provided by CRS/init)
SecAction "id:900000,phase:1,pass,nolog,initcol:ip=%{REMOTE_ADDR},expirevar:ip.sqlmap_counter=300"

### Immediate detections and blocking
# Immediately block known sqlmap User-Agent strings (case-insensitive)
SecRule REQUEST_HEADERS:User-Agent "@rx (?i)sqlmap" \
    "id:900001,phase:1,deny,log,status:403,msg:'Blocked - sqlmap User-Agent detected',tag:'SQLMAP',severity:2"

# Immediately block common SQLi payload patterns in URI, args or body (UNION SELECT, SLEEP(), BENCHMARK(), EXTRACTVALUE, LOAD_FILE, INTO OUTFILE, INFORMATION_SCHEMA)
SecRule REQUEST_URI|ARGS|REQUEST_BODY "@rx (?i)(union\s+select|sleep\s*\(|benchmark\s*\(|extractvalue\s*\(|load_file\s*\(|into\s+outfile|information_schema)" \
    "id:900002,phase:1,deny,log,status:403,msg:'Blocked - SQLi pattern detected',tag:'SQLI-Pattern',severity:2"

### Fallback: detect suspicious activity and block after repeated hits
# Initialize per-IP counter (longer expiry)
SecAction "id:900005,phase:1,pass,nolog,initcol:ip=%{REMOTE_ADDR},expirevar:ip.sqlmap_counter=300"

# Increment counter on suspicious patterns (less aggressive; used with immediate denies above)
SecRule REQUEST_HEADERS:User-Agent "@pm sqlmap" \
    "id:900006,phase:2,pass,log,tag:'SQLMAP',msg:'sqlmap User-Agent seen (counter increment)',setvar:ip.sqlmap_counter=+1,expirevar:ip.sqlmap_counter=300"

SecRule ARGS|REQUEST_BODY "@rx (?i)(union\s+select|sleep\s*\(|benchmark\s*\()" \
    "id:900007,phase:2,pass,log,tag:'SQLI-Pattern',msg:'Possible SQLi pattern detected (counter increment)',setvar:ip.sqlmap_counter=+1,expirevar:ip.sqlmap_counter=300"

# If counter > 1 (2 or more suspicious hits) then block the IP
SecRule IP:SQLMAP_COUNTER "@gt 1" \
    "id:900010,phase:1,deny,log,status:403,msg:'IP blocked due to repeated SQLi-like requests',tag:'sqlmap-block'"

### Exact payload matches
SecRule ARGS|REQUEST_BODY "@pmx sqlmap" "id:900020,phase:2,deny,log,msg:'sqlmap signature in payload'"

# --- Rate limiting via ModSecurity IP counter (fallback) ---
# Initialize a per-IP request counter with short expiry
SecAction "id:900030,phase:1,pass,nolog,initcol:ip=%{REMOTE_ADDR},expirevar:ip.req_counter=60"

# Increment request counter on every request
SecRule REQUEST_HEADERS:User-Agent "@rx .*" "id:900031,phase:1,pass,nolog,setvar:ip.req_counter=+1,expirevar:ip.req_counter=60"

# If more than 20 requests in 60s, deny (adjust threshold as needed)
SecRule IP:REQ_COUNTER "@gt 20" \
    "id:900032,phase:1,deny,log,status:429,msg:'Rate limit exceeded - too many requests',tag:'rate-limit'"

# Also increment sqlmap counter on fast repeated suspicious hits (harder heuristics)
SecRule REQUEST_HEADERS:User-Agent "@pm sqlmap" "id:900033,phase:1,pass,log,setvar:ip.sqlmap_counter=+2,expirevar:ip.sqlmap_counter=300"
